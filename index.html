<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title> Fitness </title>
  

<style>
  .camera-panel {
    position: relative; /* makes it the anchor for anything inside it that uses absolute positioning */
    width: 100%;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }

  #videoElement {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror to match video*/
    display: none; 
  }

  #outputCanvas {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* mirror to match video*/
    z-index: 1; /*sits on top*/
  }


</style>

</head>
<body>
  <div class="camera-panel">

    <!-- Recieves the webcam stream-->
    <video id="videoElement" playsinline></video>

    <!--Frame includes camera image and skeleton overlay-->
    <canvas id="outputCanvas"></canvas>
  </div>

    <!-- 1. Camera utility - wraps getUsermedia into a Clean API-->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"
          crossorigin="anonymous"></script>

  <!-- 2. Drawing Utilities-->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"
          crossorigin="anonymous"></script>

  <!-- 3. The Pose model itself -->
   <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"
   crossorigin="anonymous"></script>

<!-- crossorigin="anonymous, needs it, without it some browsers block scripts loaded from a different domain, security check (like I know this is from another server and I accept that)"-->
<button id="takePhoto">Take Photo</button>
<img id="photo" style="max-width: 100%;" />

<script type="module">
  import { Camera, CameraResultType } from '@capacitor/camera';

  document.getElementById('takePhoto').addEventListener('click', async () => {
    const photo = await Camera.getPhoto({
      resultType: CameraResultType.Uri
    });
    document.getElementById('photo').src = photo.webPath;
  });
</script>

  <script>
    const video  = document.getElementById('videoElement');
    const canvas = document.getElementById('outputCanvas');
    const ctx    = canvas.getContext('2d'); 

    async function startCamera() {
      try {

        // Ask the browse for webcam access
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            width: 1200,
            height: 720,
            facingMode: 'user' //front-facing camera
          },
          audio: false
        });

        // Attach the stream to the video element 
        video.srcObject = stream;
        video.play();

        //Initialize MediaPipe
        initPose();

      } catch (err) {
        // User denied permission, or no camera found
        console.error('Camera error:', err.message);
      }
    }

  

  
    let pose; // will hold the Pose instance

    function initPose() {
      pose = new Pose({
        // where to load the model files from 
        locateFile: (file) =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,   // 0 = fast, 1 = balanced, 2 = accurate
        smoothLandmarks: true, // reduces jitter between frames
        enableSegmentation: false, // don't need background removal
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      // function fires EVERY FRAME with the results
      pose.onResults(onResults);

      //MediaPipe Camera utility - sends each frame to pose.send()
      const camera = new Camera(video, {
        onFrame: async () => {
          // Resize canvas to match actual video dimensions
          canvas.width = video.videoWidth || 1280;
          canvas.height = video.videoHeight || 720;
          //send the current video frame to pose detection 
          await pose.send({image: video});
        },
        width: 1280,
        height: 720
      });

      camera.start();
    }

  
    function onResults(results) {
      // Clear last frame's drawing
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw the camera image first (the background)
      // results.image is the raw video frame MediaPipe processed 
      ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);

      // If no person detected stop here
      if (!results.poseLandmarks) return;

      // Draw the skeleton on top
      drawSkeleton(results.poseLandmarks, 'green');

      const lm = results.poseLandmarks ;

  

       const kneeAngleL = calcAngle(lm[23], lm[25], lm[27]);

  const kneeAngleR = calcAngle(lm[24], lm[26], lm[28]);

  const kneeAvg = (kneeAngleL + kneeAngleR) / 2;

  const hipAngle = calcAngle(lm[11], lm[23], lm[25]);

  console.log('Knee angle:', Math.round(kneeAvg)); 

  
  

    }

    // Each pair = a "bone" to draw a line between
    const CONNECTIONS = [
      [11,12],[11,13],[13,15],[12,14],[14,16], // arms
      [11,23],[12,24],[23,24],                 // torso
      [23,25],[25,27],[24,26],[26,28],         // legs
      [27,29],[29,31],[28,30],[30,32]          // feet
    ];

// Color options for different form states
    const COLORS = {
      green: { joint: '#22d78e', bone: 'rgba(34,215,142,0.7)' },
      red:   { joint: '#ff4d4d', bone: 'rgba(255,77,77,0.7)'   },
      amber: { joint: '#ffb020', bone: 'rgba(255,176,32,0.7)'  },
      gray:  { joint: '#888',    bone: 'rgba(136,136,136,0.5)' },
    };

    function lmToCanvas(lm) {
      // Landmarks use 0–1 normalized coords. Multiply by canvas size.
      return { x: lm.x * canvas.width, y: lm.y * canvas.height };
    }

    function drawSkeleton(lm, colorKey) {
      const c = COLORS[colorKey] || COLORS.green;

      // 1. Draw bones (lines between pairs)
      ctx.lineWidth = 3;
      ctx.strokeStyle = c.bone;
      ctx.lineCap = 'round';

      for (const [a, b] of CONNECTIONS) {
        if (!lm[a] || !lm[b]) continue; // skip if landmark missing
        const pa = lmToCanvas(lm[a]);
        const pb = lmToCanvas(lm[b]);
        ctx.beginPath();
        ctx.moveTo(pa.x, pa.y);
        ctx.lineTo(pb.x, pb.y);
        ctx.stroke();
      }

  // 2. Draw joints (circles at each point)
  for (let i = 11; i <= 32; i++) {
    // Skip if landmark has low confidence
    if (!lm[i] || lm[i].visibility < 0.3) continue;
    const p = lmToCanvas(lm[i]);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = c.joint;
    ctx.fill();
  }
 }

 startCamera();


  

  function calcAngle(a, b, c) {

    // Vector from B to A
    const ax= a.x - b.x, ay = a.y - b.y;

    // Vector from B to C
    const cx = c.x - b.x, cy = c.y - b.y;

    // Dot product: how much the two vectors point in the same direction

    const dot = ax * cx + ay * cy;

    // magnitudes of each vector
    const magA = Math.sqrt(ax * ax + ay * ay);
    const magC = Math.sqrt(cx * cx + cy * cy);

    // Avoid division by zero
    if (magA === 0 || magC === 0) return 0;

    // [-1, 1] to avoid floating point errors causing arccos to return NaN
    const cosVal = Math.max(-1, Math.min(1 , dot / (magA * magC)));

    // Convert from radian to degrees
    return (Math.acos(cosVal) * 180) / Math.PI;
  }

 

  </script>

</body>

</html>
